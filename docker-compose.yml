version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduler_db
    environment:
      POSTGRES_DB: instagram_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src/backend/InstagramScheduler.API
      dockerfile: Dockerfile
    container_name: scheduler_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=instagram_scheduler;Username=postgres;Password=${DB_PASSWORD:-postgres123}
      - JWT_SECRET=${JWT_SECRET}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_REDIRECT_URI=${META_REDIRECT_URI}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend/instagram-scheduler-app
      dockerfile: Dockerfile
    container_name: scheduler_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
