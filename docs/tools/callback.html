<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Callback Instagram</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; text-align: center; }
    .code-box { background: #f0f0f0; padding: 16px; border-radius: 8px; font-family: monospace; word-break: break-all; margin: 20px 0; }
    .btn { padding: 10px 20px; background: #e1306c; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <h2>✅ Autorización recibida</h2>
  <p>Copia este código y pégalo en la herramienta:</p>
  <div class="code-box" id="codeDisplay"></div>
  <button class="btn" onclick="copyCode()">📋 Copiar código</button>
  <p style="margin-top:20px; color:#888;">Ahora vuelve a la pestaña anterior y pega la URL completa de esta página.</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      document.getElementById('codeDisplay').textContent = code;
    } else {
      document.getElementById('codeDisplay').textContent = 'No se encontró código en la URL';
    }
    function copyCode() {
      navigator.clipboard.writeText(document.getElementById('codeDisplay').textContent);
      alert('Código copiado');
    }
  </script>
</body>
</html>
